<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Flashcard</title>
    
    <!-- Font Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../1.style/library.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Thư viện Flashcard</h1>
            <a href="study.html" class="study-link">🎯 Bắt đầu học →</a>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-count">0</div>
                <div>Tổng số thẻ</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="learned-count">0</div>
                <div>Đã nhớ ✅</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="learning-count">0</div>
                <div>Đang học 📖</div>
            </div>
        </div>

        <div class="add-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Thuật ngữ / Câu hỏi</label>
                    <input type="text" id="term-input" placeholder="Nhập thuật ngữ...">
                </div>
                <div class="form-group">
                    <label>Định nghĩa / Câu trả lời</label>
                    <textarea id="definition-input" rows="2" placeholder="Nhập định nghĩa..."></textarea>
                </div>
                <button class="btn-add" id="add-btn">➕ Thêm thẻ</button>
            </div>
        </div>

        <div class="toolbar">
            <button class="tool-btn" id="shuffle-btn">🎲 Xáo trộn thứ tự</button>
            <button class="tool-btn" id="reset-learned-btn">🔄 Reset tất cả tiến độ</button>
            <button class="tool-btn danger" id="delete-all-btn">🗑️ Xóa tất cả thẻ</button>
        </div>

        <div class="cards-grid" id="cards-container"></div>
    </div>

    <!-- Modal chỉnh sửa -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>✏️ Chỉnh sửa thẻ</h3>
            <div class="form-group">
                <label>Thuật ngữ</label>
                <input type="text" id="edit-term">
            </div>
            <div class="form-group">
                <label>Định nghĩa</label>
                <textarea id="edit-definition" rows="3"></textarea>
            </div>
            <div class="modal-buttons">
                <button class="tool-btn" id="save-edit-btn">💾 Lưu</button>
                <button class="tool-btn" id="cancel-edit-btn">❌ Hủy</button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../2.script/library.js"></script>
</body>
</html>
