<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoQuiz</title>
    <link rel="stylesheet" href="css/home.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <header class="header"> 
        <div class="logo">
            <!-- ảnh logo -->
            <img src="images/auto-quiz.png" alt="FlashStudy logo">
        </div>
        <!-- icon menu -->
        <input type="checkbox" id="check">
        <label for="check" class="icons">
            <i class='bx bx-menu' id="menu-icon"></i>
            <i class='bx bx-x' id="close-icon"></i> 
        </label>
        <!-- đề mục menu -->
        <nav class="navbar">
            <a href="/" style="--i:0;">Home</a>
            <a href="pages/library1.html" style="--i:1;">Students</a>
            <a href="pages/about_us.html" style="--i:2;">About us</a>
            <a href="pages/contact.html" style="--i:3;">Contact</a>
        </nav>
    </header>
    <section class="main">
            <div class="home-content">
                <h1>Flashcard Website</h1>
                <p>
                    Test your knowledge with quick questions, clear rules, and a focused quiz experience.
                    Press start when you are ready to begin.
                </p>
                <a href="pages/login.html" class="start-btn">Start Flashcard</a>
            </div>
        </section>
    <script>
// Đếm thời gian ở lại trang
let startTime = Date.now();
let hasRecorded = false;

// Hàm ghi nhận lượt xem sau 2 phút (120000 ms)
setTimeout(() => {
    if (!hasRecorded) {
        // Gửi request lên server để ghi nhận lượt xem
        fetch('/api/views/track-homepage-view', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                console.log('✅ Đã ghi nhận lượt xem (ở lại 2 phút)');
                hasRecorded = true;
            }
        })
        .catch(err => console.error('Lỗi ghi nhận lượt xem:', err));
    }
}, 120000); // 2 phút = 120000 milliseconds

// Nếu người dùng rời trang trước "2 phút thì không ghi nhận
window.addEventListener('beforeunload', () => {
    const timeSpent = Date.now() - startTime;
    if (timeSpent < 120000 && !hasRecorded) {
        console.log("Người dùng rời trang sau ${Math.round(timeSpent/1000)} giây, không tính lượt xem");
    }
});
</script>
</body>
</html>
